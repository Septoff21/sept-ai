{{ define "main" }}
<div style="margin-bottom:20px">
    <a href="{{ relURL "/tools/" }}" style="color:var(--text2);font-size:13px">← Back to tools</a>
</div>

<div class="card" style="text-align:center;padding:40px">
    <div style="font-size:48px;margin-bottom:12px">🔁</div>
    <div style="color:var(--text2)">Tool detail pages are now static — redirecting you...</div>
    <div style="margin-top:12px;font-size:13px;color:var(--text3)">If you aren't redirected, please wait a moment or go back to the tools list.</div>
</div>

<script>
const allTools = {{ site.Data.tools | jsonify | safeJS }} || [];
const params = new URLSearchParams(location.search);
const id = params.get('id');
if (id) {
    const tool = allTools.find(t => t.id === id || t.name.toLowerCase().replace(/[^a-z0-9]/g, '-') === id);
    if (tool && tool.id) {
        window.location.replace('{{ relURL "/tools/" }}' + encodeURIComponent(tool.id) + '/');
    }
}
</script>
{{ end }}
