<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {{ partial "seo.html" . }}
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <!-- Prevent flash of wrong theme -->
    <script>
    (function(){
        var saved = localStorage.getItem('septai_theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
    })();
    </script>
    <style>
        /* ─── Design Tokens ─────────────────────────────────── */
        :root {
            --radius: 10px;
            --radius-lg: 16px;
            --transition: 0.18s ease;
            /* neon palette (shared) */
            --neon-amber: #cc785c;
            --neon-violet: #7c3aed;
            --neon-cyan:   #06b6d4;
            --neon-green:  #10b981;
        }

        /* ─── Dark Mode (default) ────────────────────────────── */
        :root[data-theme="dark"] {
            --bg:       #1a1817;
            --bg2:      #242220;
            --bg3:      #2e2b29;
            --bg4:      #363330;
            --text:     #e8e3dc;
            --text1:    #e8e3dc;
            --text2:    #a09990;
            --text3:    #635c56;
            --accent:   #cc785c;
            --accent2:  #e8926e;
            --blue:     #60a5fa;
            --green:    #4ade80;
            --red:      #f87171;
            --yellow:   #fbbf24;
            --border:   #38332e;
            --border2:  #4a433c;
            --shadow:   0 1px 4px rgba(0,0,0,0.5);
            --shadow-lg:0 8px 32px rgba(0,0,0,0.45);
            --glow:     0 0 20px rgba(204,120,92,0.18);
        }

        /* ─── Light Mode ─────────────────────────────────────── */
        :root[data-theme="light"] {
            --bg:       #faf9f6;
            --bg2:      #f2efea;
            --bg3:      #eae6df;
            --bg4:      #e2ded6;
            --text:     #1c1917;
            --text1:    #1c1917;
            --text2:    #57534e;
            --text3:    #a8a29e;
            --accent:   #b5603f;
            --accent2:  #cc785c;
            --blue:     #1d4ed8;
            --green:    #15803d;
            --red:      #b91c1c;
            --yellow:   #b45309;
            --border:   #ddd8d0;
            --border2:  #ccc5bb;
            --shadow:   0 1px 4px rgba(0,0,0,0.08);
            --shadow-lg:0 8px 32px rgba(0,0,0,0.12);
            --glow:     0 0 24px rgba(180,96,63,0.14);
        }

        /* ─── Reset & Base ───────────────────────────────────── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", "Noto Sans SC", sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--blue); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ─── Layout ─────────────────────────────────────────── */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        /* ─── Header ─────────────────────────────────────────── */
        header {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: var(--shadow);
        }
        .header-inner {
            display: flex; align-items: center;
            justify-content: space-between;
            padding: 14px 0; gap: 16px;
        }
        .logo {
            display: flex; align-items: center; gap: 10px;
            font-size: 18px; font-weight: 800;
            color: var(--accent); letter-spacing: -0.3px;
            white-space: nowrap;
        }
        .logo img { width: 32px; height: 32px; border-radius: 8px; }
        .logo-sub {
            color: var(--text3); font-weight: 400;
            font-size: 12px; margin-left: 4px;
            display: none; /* hide on small screens */
        }
        @media (min-width: 600px) { .logo-sub { display: inline; } }

        nav { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
        nav a {
            display: flex; align-items: center; gap: 6px;
            color: var(--text2); font-size: 13px; font-weight: 500;
            padding: 6px 10px; border-radius: 7px;
            transition: background var(--transition), color var(--transition);
        }
        nav a svg { width: 15px; height: 15px; flex-shrink: 0; }
        nav a:hover {
            color: var(--text); background: var(--bg3);
            text-decoration: none;
        }
        nav a.active { color: var(--accent); background: var(--bg3); }

        .header-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

        /* Theme toggle */
        .theme-btn {
            display: flex; align-items: center; justify-content: center;
            width: 34px; height: 34px;
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 8px; cursor: pointer;
            color: var(--text2); transition: all var(--transition);
        }
        .theme-btn:hover { color: var(--accent); border-color: var(--accent); }
        .theme-btn svg { width: 16px; height: 16px; }
        .theme-icon-light { display: none; }
        .theme-icon-dark  { display: block; }
        [data-theme="light"] .theme-icon-light { display: block; }
        [data-theme="light"] .theme-icon-dark  { display: none; }

        .streak-badge {
            font-size: 12px; color: var(--accent); font-weight: 600;
            background: rgba(204,120,92,0.12); padding: 4px 10px;
            border-radius: 20px; white-space: nowrap;
        }

        /* ─── Main ───────────────────────────────────────────── */
        main.container { padding: 28px 0; }

        /* ─── Grid ───────────────────────────────────────────── */
        .grid { display: grid; grid-template-columns: 1fr 330px; gap: 24px; }

        /* ─── Cards ──────────────────────────────────────────── */
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            transition: background var(--transition), border-color var(--transition);
        }
        .card-title {
            font-size: 15px; font-weight: 700;
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
            color: var(--text);
        }
        .card-title svg { width: 16px; height: 16px; color: var(--accent); }

        /* Neon border card — used for spotlight / trending */
        .card-neon {
            background: var(--bg2);
            border: 1px solid transparent;
            background-clip: padding-box;
            border-radius: var(--radius-lg);
            padding: 22px;
            margin-bottom: 20px;
            position: relative;
            box-shadow: var(--glow);
        }
        .card-neon::before {
            content: '';
            position: absolute; inset: -1px;
            border-radius: calc(var(--radius-lg) + 1px);
            background: linear-gradient(135deg, var(--neon-amber), var(--neon-violet) 50%, var(--neon-cyan));
            z-index: -1;
            opacity: 0.55;
        }
        [data-theme="light"] .card-neon::before { opacity: 0.35; }

        /* ─── Hot list ───────────────────────────────────────── */
        .hot-item {
            display: flex; align-items: flex-start; gap: 12px;
            padding: 11px 0; border-bottom: 1px solid var(--border);
        }
        .hot-item:last-child { border-bottom: none; }
        .hot-rank {
            width: 26px; height: 26px; border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 12px; flex-shrink: 0;
        }
        .hot-rank.top3 { background: var(--accent); color: #fff; }
        .hot-rank.normal { background: var(--bg3); color: var(--text3); }
        .hot-content { flex: 1; min-width: 0; }
        .hot-title { font-size: 14px; font-weight: 500; line-height: 1.4; }
        .hot-meta { font-size: 12px; color: var(--text3); margin-top: 4px; }
        .hot-badge {
            font-size: 11px; padding: 2px 7px; border-radius: 5px;
            background: var(--bg3); color: var(--text2); margin-left: 6px;
        }
        .hot-badge.fire { background: rgba(204,120,92,0.18); color: var(--accent); }

        /* ─── Tool Cards ─────────────────────────────────────── */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }
        .tool-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            transition: all var(--transition);
            cursor: pointer;
        }
        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg), 0 0 0 1px var(--accent);
            text-decoration: none;
        }
        .tool-card .tool-header {
            display: flex; align-items: center;
            gap: 11px; margin-bottom: 10px;
        }
        .tool-card .tool-icon {
            width: 38px; height: 38px;
            background: var(--bg);
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-size: 19px; flex-shrink: 0;
            border: 1px solid var(--border);
        }
        .tool-card .tool-name {
            font-size: 14px; font-weight: 600;
            color: var(--blue);
            word-break: break-word;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .tool-card .tool-desc {
            font-size: 12px; color: var(--text2);
            margin-bottom: 12px; line-height: 1.55;
        }
        .tool-card .tool-footer {
            display: flex; align-items: center;
            justify-content: space-between;
            flex-wrap: wrap; gap: 6px;
        }
        .tool-card .tool-tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .tool-card .tool-tag {
            font-size: 11px; padding: 2px 7px;
            border-radius: 10px;
            background: var(--bg); color: var(--text2);
        }
        .tool-card .tool-tag.hot {
            background: rgba(204,120,92,0.15); color: var(--accent);
        }
        .tool-card .tool-tag.free {
            background: rgba(74,222,128,0.12); color: var(--green);
        }
        [data-theme="light"] .tool-card .tool-tag.free {
            background: rgba(21,128,61,0.1); color: var(--green);
        }
        .tool-card .tool-price {
            font-size: 12px; color: var(--accent); font-weight: 500;
        }

        /* ─── Spotlight ──────────────────────────────────────── */
        .spotlight {
            background: linear-gradient(135deg, var(--bg2), var(--bg3));
            border: 1px solid var(--accent);
            border-radius: var(--radius); padding: 22px; margin-bottom: 20px;
            box-shadow: var(--glow);
        }
        .spotlight-name { font-size: 19px; font-weight: 700; margin-bottom: 8px; }
        .spotlight-desc { color: var(--text2); font-size: 14px; line-height: 1.6; }
        .spotlight-btn {
            display: inline-block; margin-top: 12px;
            padding: 8px 20px; background: var(--accent); color: #fff;
            border-radius: 7px; font-size: 13px; font-weight: 600;
            transition: opacity var(--transition);
        }
        .spotlight-btn:hover { opacity: 0.88; text-decoration: none; }

        /* ─── Trending ───────────────────────────────────────── */
        .trend-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 9px 0; border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .trend-item:last-child { border-bottom: none; }
        .trend-up { color: var(--green); font-weight: 600; }

        /* ─── Tags ───────────────────────────────────────────── */
        .tag {
            display: inline-block; padding: 3px 10px; border-radius: 12px;
            font-size: 12px; background: var(--bg3); color: var(--text2);
            margin: 2px 4px 2px 0; transition: background var(--transition);
        }
        .tag:hover { background: var(--bg4); color: var(--text); text-decoration: none; }

        /* ─── Category nav ───────────────────────────────────── */
        .category-tag {
            transition: all var(--transition);
        }
        .category-tag:hover {
            background: var(--accent) !important;
            color: #fff !important;
            border-color: var(--accent) !important;
        }
        .category-tag:active { transform: scale(0.95); }

        /* ─── Search box ─────────────────────────────────────── */
        .search-box {
            width: 100%; padding: 11px 80px 11px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            background: var(--bg2); color: var(--text);
            font-size: 14px; outline: none;
            transition: border-color var(--transition), box-shadow var(--transition);
        }
        .search-box:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(204,120,92,0.12); background: var(--bg); }

        /* ─── Random / CTA buttons ───────────────────────────── */
        .random-btn {
            display: block; width: 100%; padding: 11px;
            background: var(--bg3); border: 1px dashed var(--border2);
            border-radius: var(--radius); color: var(--text2);
            font-size: 13px; cursor: pointer; text-align: center;
            transition: all var(--transition);
        }
        .random-btn:hover { border-color: var(--accent); color: var(--accent); text-decoration: none; }

        /* ─── Neon gradient divider ──────────────────────────── */
        .neon-divider {
            height: 2px; border: none; margin: 0;
            background: linear-gradient(90deg,
                transparent 0%,
                var(--neon-amber) 25%,
                var(--neon-violet) 60%,
                var(--neon-cyan) 85%,
                transparent 100%);
            opacity: 0.45;
            border-radius: 2px;
        }
        [data-theme="light"] .neon-divider { opacity: 0.3; }

        /* ─── Footer ─────────────────────────────────────────── */
        footer {
            text-align: center; padding: 36px 0;
            color: var(--text3); font-size: 12px;
            border-top: 1px solid var(--border);
            margin-top: 12px;
        }

        /* ─── Responsive ─────────────────────────────────────── */
        @media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
            .tools-grid { grid-template-columns: 1fr; }
            .header-inner { flex-wrap: wrap; gap: 10px; }
            nav { gap: 2px; }
            nav a span { display: none; } /* icon only on small screens */
            .card { padding: 14px; }
            .container { padding: 0 12px; }
            main.container { padding: 16px 0; }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .tools-grid { grid-template-columns: repeat(2, 1fr); }
        }

        /* ─── V5 Polish ──────────────────────────────────────── */

        /* Global lazy load */
        img { loading: lazy; }

        /* Text selection */
        ::selection { background: rgba(204,120,92,0.28); color: var(--text); }

        /* Custom scrollbar (webkit) */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        /* Card micro-lift on hover */
        .card:hover {
            border-color: var(--border2);
        }
        .tool-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(204,120,92,0.2);
        }

        /* Card-neon glow pulse on hover */
        .card-neon:hover::before { opacity: 0.75; }
        [data-theme="light"] .card-neon:hover::before { opacity: 0.5; }

        /* Code blocks */
        code {
            font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
            font-size: 0.875em;
            padding: 2px 6px;
            background: var(--bg3);
            border-radius: 4px;
            color: var(--accent);
        }
        pre {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            overflow-x: auto;
            font-size: 13px;
            line-height: 1.7;
            margin-bottom: 16px;
        }
        pre code { background: none; padding: 0; color: var(--text); }

        /* Skip to content (a11y) */
        .skip-link {
            position: absolute; top: -100%; left: 8px;
            background: var(--accent); color: #fff;
            padding: 8px 16px; border-radius: 0 0 8px 8px;
            font-size: 13px; font-weight: 600; z-index: 9999;
        }
        .skip-link:focus { top: 0; }

        /* Focus ring */
        a:focus-visible, button:focus-visible, input:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        /* Back link */
        .back-link {
            display: inline-flex; align-items: center; gap: 6px;
            color: var(--text2); font-size: 13px; text-decoration: none;
            transition: color var(--transition);
        }
        .back-link:hover { color: var(--accent); text-decoration: none; }

        /* ─── Transitions ────────────────────────────────────── */
        .card, .tool-card, header, footer,
        .tag, .hot-badge, .spotlight {
            transition: background var(--transition), border-color var(--transition),
                        color var(--transition), box-shadow var(--transition);
        }
    </style>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to content</a>
    <header>
        <div class="container header-inner">
            <a href="{{ relURL "/" }}" class="logo" style="text-decoration:none">
                <img src="/logos/logo.png" alt="Sept-AI logo">
                Sept-AI
                <span class="logo-sub">Updated every 6 h</span>
            </a>

            <nav>
                {{ range .Site.Menus.main }}
                <a href="{{ .URL }}"
                   {{ if eq $.RelPermalink .URL }}class="active"{{ end }}>
                    <!-- Lucide icon via data-lucide, rendered by script at bottom -->
                    <svg data-lucide="{{ .Pre }}" aria-hidden="true"></svg>
                    <span>{{ .Name }}</span>
                </a>
                {{ end }}
            </nav>

            <div class="header-right">
                <div class="streak-badge" id="streak" style="display:none"></div>
                <button class="theme-btn" onclick="toggleTheme()" title="Toggle light / dark">
                    <!-- Moon: shown in dark mode -->
                    <svg class="theme-icon-dark" data-lucide="moon" aria-hidden="true"></svg>
                    <!-- Sun: shown in light mode -->
                    <svg class="theme-icon-light" data-lucide="sun" aria-hidden="true"></svg>
                </button>
            </div>
        </div>
        <!-- Neon under-header rule -->
        <hr class="neon-divider">
    </header>

    <main class="container" id="main-content">
        {{ block "main" . }}{{ end }}
    </main>

    <footer>
        <div class="container">
            <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px">
                <div style="display:flex;align-items:center;gap:8px">
                    <span style="color:var(--accent);font-weight:700;font-size:13px">SEPT-AI</span>
                    <span style="color:var(--text3);font-size:12px">— AI navigator, refreshed every 6 h</span>
                </div>
                <div style="display:flex;gap:16px;font-size:12px">
                    <a href="{{ relURL "/" }}"         style="color:var(--text3);text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">Home</a>
                    <a href="{{ relURL "/tools/" }}"   style="color:var(--text3);text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">Tools</a>
                    <a href="{{ relURL "/models/" }}"  style="color:var(--text3);text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">Models</a>
                    <a href="{{ relURL "/news/" }}"    style="color:var(--text3);text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">News</a>
                    <a href="{{ relURL "/me/" }}"      style="color:var(--text3);text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">Me</a>
                    <a href="https://github.com/Septoff21/sept-ai" target="_blank" rel="noopener" style="color:var(--text3);text-decoration:none" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text3)'">GitHub</a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Lucide icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        if (window.lucide) { lucide.createIcons(); }
    });
    </script>

    <script>
    /* ── Theme toggle ── */
    function toggleTheme() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('septai_theme', next);
    }

    /* ── Visit streak ── */
    (function(){
        var key = 'septai_streak';
        var today = new Date().toISOString().slice(0,10);
        var data = JSON.parse(localStorage.getItem(key) || '{"streak":0,"last":""}');
        if (data.last !== today) {
            var yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
            data.streak = data.last === yesterday ? data.streak + 1 : 1;
            data.last = today;
            localStorage.setItem(key, JSON.stringify(data));
        }
        var el = document.getElementById('streak');
        if (data.streak > 0 && el) {
            el.textContent = '🔥 ' + data.streak + ' day streak';
            el.style.display = '';
        }
    })();
    </script>
</body>
</html>
