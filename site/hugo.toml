baseURL                = "https://sept-ai.netlify.app/"
languageCode           = "en"
title                  = "Sept-AI — Your AI Navigator & Knowledge Hub"
defaultContentLanguage = "en"
hasCJKLanguage         = true
# Disable taxonomy/term pages (tags contain # chars that break Netlify)
disableKinds           = ["taxonomy", "term", "RSS"]

[pagination]
  pagerSize = 20

[params]
  description = "Sept-AI is a curated, auto-updating navigator for AI tools, models, agents, and news — paired with a personal knowledge vault. 170+ tools, 40+ sources, refreshed every 6 hours."
  keywords    = "AI tools, AI navigator, LLM directory, AI models, AI agents, Claude, GPT, Gemini, Cursor, AI news, Anthropic, OpenAI, DeepMind, HuggingFace"
  author      = "Septoff21"
  tagline     = "Discover. Learn. Build."
  email       = "septoff21@gmail.com"
  github      = "https://github.com/Septoff21/sept-ai"

[params.homepage]
  showSpotlight = true
  showTrending  = true
  showHotNews   = true

[params.seo]
  ogImage     = "/logos/logo.png"
  twitterCard = "summary_large_image"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home    = ["HTML", "JSON"]
  section = ["HTML"]
  page    = ["HTML"]

[sitemap]
  changefreq = "daily"
  filename   = "sitemap.xml"
  priority   = 0.5

[minify]
  disableXML = false

